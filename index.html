<!DOCTYPE html>
<html>
<head>
  <title>UM Attendance Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    iframe {
      width: 100%;
      height: 900px;
      border: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h3 id="statusText">Verifying your location...</h3>

<!-- Form will load here -->
<iframe id="formFrame" style="display:none;"></iframe>

<script>
const classLat = 3.116635724520063;
const classLon = 101.65595507854434;
const allowedRadius = 50; // ✅ Updated to 50 meters

function toRad(x) {
  return x * Math.PI / 180;
}

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

navigator.geolocation.getCurrentPosition(function(position) {

  const studentLat = position.coords.latitude;
  const studentLon = position.coords.longitude;
  const accuracy = position.coords.accuracy;

  const distance = calculateDistance(classLat, classLon, studentLat, studentLon);

  let status = "INVALID";

  // ✅ Validate BOTH distance and GPS accuracy
  if(distance <= allowedRadius && accuracy <= 50){
      status = "VALID";

      document.getElementById("statusText").innerHTML =
          "Location verified. Loading attendance form...";

      const formURL =
        "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=qbE7psJIi0SGkzMXsAyn-3ei0yfHnBpAl7nvufhpYcZUQU8yTFFHODFXWUUyQlQ0RkZBN1hYTUcyMC4u"
        + "&r958810d0e940488d91f69e1d7e8b9287=" + studentLat
        + "&r27336dc45ec8471c8f0e826133916aea=" + studentLon
        + "&r4e931dc60dfa4ae0a91683796aa34472=" + distance
        + "&r12931d7000c84132a2aeca7033fedbaa=" + status;

      const iframe = document.getElementById("formFrame");
      iframe.src = formURL;
      iframe.style.display = "block";

  } else {

      document.getElementById("statusText").innerHTML =
          "❌ You are not within the allowed location (50 m) or GPS is not accurate enough.";

  }

}, function(error){
  document.getElementById("statusText").innerHTML =
      "Location access denied. Please enable GPS and refresh.";
}, {
  enableHighAccuracy: true,  // ✅ Force GPS instead of WiFi
  timeout: 10000,
  maximumAge: 0
});
</script>

</body>
</html>
