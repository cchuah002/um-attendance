<!DOCTYPE html>
<html>
<head>
  <title>UM Attendance Verification</title>
</head>
<body>
<h3>Verifying your location...</h3>

<script>
const classLat = 3.117474;     // Replace
const classLon = 101.655675;   // Replace
const allowedRadius = 50;      // meters

function toRad(x) {
  return x * Math.PI / 180;
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

navigator.geolocation.getCurrentPosition(
  function(position) {

    const userLat = position.coords.latitude;
    const userLon = position.coords.longitude;

    const distance = getDistance(userLat, userLon, classLat, classLon);

    if (distance <= allowedRadius) {

      const formURL = "YOUR_FORM_LINK";

      window.location.href =
        formURL +
        "&FIELD_LAT=" + userLat +
        "&FIELD_LON=" + userLon;

    } else {
      document.body.innerHTML =
        "<h2 style='color:red'>You are not within class area.</h2>" +
        "<p>Distance: " + Math.round(distance) + " meters</p>";
    }

  },
  function(error) {
    document.body.innerHTML =
      "<h3>Location failed.</h3>" +
      "<p>Please use Chrome and enable precise location.</p>";
  },
  {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  }
);
</script>

</body>
</html>
